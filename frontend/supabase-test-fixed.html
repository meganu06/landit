<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandIt - Supabase Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: Inter, sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto;
        }
        .section { 
            margin: 20px 0; 
            padding: 20px; 
            border: 1px solid #ddd; 
            border-radius: 8px;
        }
        button { 
            padding: 10px 20px; 
            margin: 5px; 
            border: none; 
            border-radius: 4px; 
            background: #2563eb; 
            color: white; 
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        input { 
            padding: 8px; 
            margin: 5px; 
            border: 1px solid #ddd; 
            border-radius: 4px;
        }
        .result { 
            margin: 10px 0; 
            padding: 10px; 
            background: #f3f4f6; 
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🚀 LandIt - Supabase Integration Test</h1>
    
    <div class="section">
        <h2>1. Connection Test</h2>
        <button onclick="testConnection()">Test Supabase Connection</button>
        <div id="connectionResult" class="result"></div>
    </div>

    <div class="section">
        <h2>2. Authentication Test</h2>
        <div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="signUp()">Sign Up</button>
            <button onclick="signIn()">Sign In</button>
            <button onclick="signOut()">Sign Out</button>
        </div>
        <div id="authResult" class="result"></div>
    </div>

    <div class="section">
        <h2>3. Database Test</h2>
        <button onclick="testDatabase()">Test Database Query</button>
        <div id="dbResult" class="result"></div>
    </div>

    <!-- Load Supabase CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        // Replace these with your actual Supabase credentials
        const SUPABASE_URL = 'https://wbcgymgqqrhwgshkdfcx.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndiY2d5bWdxcXJod2dzaGtkZmN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUyNzU5NTQsImV4cCI6MjA4MDg1MTk1NH0.js40qIOVH_PPaHyzo0AjTuiVsPxRy9PAaHkTtcR_P1A'
        
        // Initialize Supabase client after library loads
        let supabase;
        
        // Wait for Supabase library to load
        function initializeSupabase() {
            if (typeof window.supabase !== 'undefined') {
                try {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
                    console.log('✅ Supabase client initialized successfully')
                    
                    // Update connection status
                    const connectionResult = document.getElementById('connectionResult')
                    if (connectionResult) {
                        connectionResult.innerHTML = '🔗 Supabase client ready. Click "Test Supabase Connection" to verify database access.'
                        connectionResult.style.background = '#e0f2fe'
                    }
                } catch (error) {
                    console.error('❌ Failed to initialize Supabase:', error)
                }
            } else {
                console.log('⏳ Waiting for Supabase library to load...')
                setTimeout(initializeSupabase, 100)
            }
        }
        
        // Initialize when page loads
        window.addEventListener('load', function() {
            console.log('🚀 Page loaded, initializing Supabase...')
            initializeSupabase()
        })
        
        async function testConnection() {
            const result = document.getElementById('connectionResult')
            
            if (!supabase) {
                result.innerHTML = '❌ Supabase client not initialized yet. Please wait and try again.'
                result.style.background = '#fef2f2'
                return
            }
            
            try {
                console.log('🔍 Testing database connection...')
                const { data, error } = await supabase.from('users').select('count', { count: 'exact', head: true })
                if (error) throw error
                result.innerHTML = ✅ Connection successful! Database is accessible. 
                result.style.background = '#dcfce7'
            } catch (error) {
                console.error('Connection error:', error)
                result.innerHTML = ❌ Connection failed: ${error.message} 
                result.style.background = '#fef2f2'
            }
        }

        async function signUp() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const result = document.getElementById('authResult')
            
            if (!supabase) {
                result.innerHTML = '❌ Supabase client not initialized yet.'
                return
            }
            
            if (!email || !password) {
                result.innerHTML = '❌ Please enter email and password'
                return
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            first_name: 'Test',
                            last_name: 'User',
                            role: 'student'
                        }
                    }
                })
                
                if (error) throw error
                result.innerHTML = ✅ Sign up successful! Check your email for verification. 
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = ❌ Sign up failed: ${error.message} 
                result.style.background = '#fef2f2'
            }
        }

        async function signIn() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const result = document.getElementById('authResult')
            
            if (!supabase) {
                result.innerHTML = '❌ Supabase client not initialized yet.'
                return
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                })
                
                if (error) throw error
                result.innerHTML = ✅ Sign in successful! Welcome ${data.user.email} 
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = ❌ Sign in failed: ${error.message} 
                result.style.background = '#fef2f2'
            }
        }

        async function signOut() {
            const result = document.getElementById('authResult')
            
            if (!supabase) {
                result.innerHTML = '❌ Supabase client not initialized yet.'
                return
            }
            
            try {
                const { error } = await supabase.auth.signOut()
                if (error) throw error
                result.innerHTML = ✅ Signed out successfully 
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = ❌ Sign out failed: ${error.message} 
                result.style.background = '#fef2f2'
            }
        }

        async function testDatabase() {
            const result = document.getElementById('dbResult')
            
            if (!supabase) {
                result.innerHTML = '❌ Supabase client not initialized yet.'
                return
            }
            
            try {
                console.log('🔍 Testing database query...')
                // Test querying skills table
                const { data, error } = await supabase
                    .from('skills')
                    .select('*')
                    .limit(5)
                
                if (error) throw error
                result.innerHTML = ✅ Database query successful! Found ${data.length} skills:<br><pre>${JSON.stringify(data, null, 2)}</pre> 
                result.style.background = '#dcfce7'
            } catch (error) {
                console.error('Database error:', error)
                result.innerHTML = ❌ Database query failed: ${error.message}<br><small>Make sure you've created the database tables in Supabase SQL Editor.</small> 
                result.style.background = '#fef2f2'
            }
        }

        // Listen for auth state changes
        window.addEventListener('load', function() {
            setTimeout(() => {
                if (supabase) {
                    supabase.auth.onAuthStateChange((event, session) => {
                        console.log('Auth state changed:', event, session)
                        const authResult = document.getElementById('authResult')
                        if (event === 'SIGNED_IN') {
                            authResult.innerHTML = 🔐 User signed in: ${session.user.email} 
                        } else if (event === 'SIGNED_OUT') {
                            authResult.innerHTML = 🔓 User signed out 
                        }
                    })
                }
            }, 1000)
        })
    </script>
</body>
</html>
