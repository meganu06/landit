<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandIt - Supabase Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Supabase CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: Inter, sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto;
        }
        .section { 
            margin: 20px 0; 
            padding: 20px; 
            border: 1px solid #ddd; 
            border-radius: 8px;
        }
        button { 
            padding: 10px 20px; 
            margin: 5px; 
            border: none; 
            border-radius: 4px; 
            background: #2563eb; 
            color: white; 
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        input { 
            padding: 8px; 
            margin: 5px; 
            border: 1px solid #ddd; 
            border-radius: 4px;
        }
        .result { 
            margin: 10px 0; 
            padding: 10px; 
            background: #f3f4f6; 
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🚀 LandIt - Supabase Integration Test</h1>
    
    <div class="section">
        <h2>1. Connection Test</h2>
        <button onclick="testConnection()">Test Supabase Connection</button>
        <div id="connectionResult" class="result"></div>
    </div>

    <div class="section">
        <h2>2. Authentication Test</h2>
        <div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="signUp()">Sign Up</button>
            <button onclick="signIn()">Sign In</button>
            <button onclick="signOut()">Sign Out</button>
        </div>
        <div id="authResult" class="result"></div>
    </div>

    <div class="section">
        <h2>3. Database Test</h2>
        <button onclick="testDatabase()">Test Database Query</button>
        <div id="dbResult" class="result"></div>
    </div>

    <script>
        // Replace these with your actual Supabase credentials
        const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE'
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE'
        
        // Initialize Supabase client
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
        
        async function testConnection() {
            const result = document.getElementById('connectionResult')
            try {
                const { data, error } = await supabase.from('users').select('count', { count: 'exact', head: true })
                if (error) throw error
                result.innerHTML = `✅ Connection successful! Database is accessible.`
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = `❌ Connection failed: ${error.message}`
                result.style.background = '#fef2f2'
            }
        }

        async function signUp() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const result = document.getElementById('authResult')
            
            if (!email || !password) {
                result.innerHTML = '❌ Please enter email and password'
                return
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            first_name: 'Test',
                            last_name: 'User',
                            role: 'student'
                        }
                    }
                })
                
                if (error) throw error
                result.innerHTML = `✅ Sign up successful! Check your email for verification.`
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = `❌ Sign up failed: ${error.message}`
                result.style.background = '#fef2f2'
            }
        }

        async function signIn() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const result = document.getElementById('authResult')
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                })
                
                if (error) throw error
                result.innerHTML = `✅ Sign in successful! Welcome ${data.user.email}`
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = `❌ Sign in failed: ${error.message}`
                result.style.background = '#fef2f2'
            }
        }

        async function signOut() {
            const result = document.getElementById('authResult')
            try {
                const { error } = await supabase.auth.signOut()
                if (error) throw error
                result.innerHTML = `✅ Signed out successfully`
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = `❌ Sign out failed: ${error.message}`
                result.style.background = '#fef2f2'
            }
        }

        async function testDatabase() {
            const result = document.getElementById('dbResult')
            try {
                // Test querying skills table
                const { data, error } = await supabase
                    .from('skills')
                    .select('*')
                    .limit(5)
                
                if (error) throw error
                result.innerHTML = `✅ Database query successful! Found ${data.length} skills: ${JSON.stringify(data, null, 2)}`
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = `❌ Database query failed: ${error.message}`
                result.style.background = '#fef2f2'
            }
        }

        // Listen for auth state changes
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('Auth state changed:', event, session)
            const authResult = document.getElementById('authResult')
            if (event === 'SIGNED_IN') {
                authResult.innerHTML = `🔐 User signed in: ${session.user.email}`
            } else if (event === 'SIGNED_OUT') {
                authResult.innerHTML = `🔓 User signed out`
            }
        })
    </script>
</body>
</html>
