<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandIt - Supabase Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: Inter, sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto;
        }
        .section { 
            margin: 20px 0; 
            padding: 20px; 
            border: 1px solid #ddd; 
            border-radius: 8px;
        }
        button { 
            padding: 10px 20px; 
            margin: 5px; 
            border: none; 
            border-radius: 4px; 
            background: #2563eb; 
            color: white; 
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        input { 
            padding: 8px; 
            margin: 5px; 
            border: 1px solid #ddd; 
            border-radius: 4px;
        }
        .result { 
            margin: 10px 0; 
            padding: 10px; 
            background: #f3f4f6; 
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🚀 LandIt - Supabase Integration Test</h1>
    
    <div class="section">
        <h2>1. Connection Test</h2>
        <button onclick="testConnection()">Test Supabase Connection</button>
        <div id="connectionResult" class="result">Click the button above to test connection</div>
    </div>

    <div class="section">
        <h2>2. Authentication Test</h2>
        <div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="signUp()">Sign Up</button>
            <button onclick="signIn()">Sign In</button>
            <button onclick="signOut()">Sign Out</button>
        </div>
        <div id="authResult" class="result">Enter credentials and test authentication</div>
    </div>

    <div class="section">
        <h2>3. Database Test</h2>
        <button onclick="testDatabase()">Test Database Query</button>
        <div id="dbResult" class="result">Click the button above to test database</div>
    </div>

    <script>
        // Supabase credentials
        const SUPABASE_URL = 'https://wbcgymgqqrhwgshkdfcx.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndiY2d5bWdxcXJod2dzaGtkZmN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUyNzU5NTQsImV4cCI6MjA4MDg1MTk1NH0.js40qIOVH_PPaHyzo0AjTuiVsPxRy9PAaHkTtcR_P1A'
        
        // Global supabase client
        let supabase = null;
        
        // Initialize Supabase when page loads
        window.addEventListener('load', function() {
            console.log('Page loaded, checking for Supabase...')
            
            // Check if Supabase is available
            if (typeof window.supabase !== 'undefined') {
                console.log('Supabase library found, creating client...')
                try {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
                    console.log('✅ Supabase client created successfully')
                    
                    document.getElementById('connectionResult').innerHTML = '🔗 Supabase client ready! Click "Test Supabase Connection" to verify.'
                    document.getElementById('connectionResult').style.background = '#e0f2fe'
                } catch (error) {
                    console.error('❌ Error creating Supabase client:', error)
                    document.getElementById('connectionResult').innerHTML = '❌ Error creating Supabase client: ' + error.message
                    document.getElementById('connectionResult').style.background = '#fef2f2'
                }
            } else {
                console.log('❌ Supabase library not found')
                document.getElementById('connectionResult').innerHTML = '❌ Supabase library not loaded'
                document.getElementById('connectionResult').style.background = '#fef2f2'
            }
        })
        
        async function testConnection() {
            const result = document.getElementById('connectionResult')
            
            if (!supabase) {
                result.innerHTML = '❌ Supabase client not initialized'
                result.style.background = '#fef2f2'
                return
            }
            
            try {
                console.log('Testing connection...')
                const { data, error } = await supabase.from('users').select('count', { count: 'exact', head: true })
                if (error) throw error
                
                result.innerHTML = '✅ Connection successful! Database is accessible.'
                result.style.background = '#dcfce7'
            } catch (error) {
                console.error('Connection error:', error)
                result.innerHTML = '❌ Connection failed: ' + error.message
                result.style.background = '#fef2f2'
            }
        }

        async function signUp() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const result = document.getElementById('authResult')
            
            if (!supabase) {
                result.innerHTML = '❌ Supabase client not initialized'
                return
            }
            
            if (!email || !password) {
                result.innerHTML = '❌ Please enter email and password'
                return
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                })
                
                if (error) throw error
                result.innerHTML = '✅ Sign up successful! Check your email for verification.'
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = '❌ Sign up failed: ' + error.message
                result.style.background = '#fef2f2'
            }
        }

        async function signIn() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const result = document.getElementById('authResult')
            
            if (!supabase) {
                result.innerHTML = '❌ Supabase client not initialized'
                return
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                })
                
                if (error) throw error
                result.innerHTML = '✅ Sign in successful! Welcome ' + data.user.email
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = '❌ Sign in failed: ' + error.message
                result.style.background = '#fef2f2'
            }
        }

        async function signOut() {
            const result = document.getElementById('authResult')
            
            if (!supabase) {
                result.innerHTML = '❌ Supabase client not initialized'
                return
            }
            
            try {
                const { error } = await supabase.auth.signOut()
                if (error) throw error
                result.innerHTML = '✅ Signed out successfully'
                result.style.background = '#dcfce7'
            } catch (error) {
                result.innerHTML = '❌ Sign out failed: ' + error.message
                result.style.background = '#fef2f2'
            }
        }

        async function testDatabase() {
            const result = document.getElementById('dbResult')
            
            if (!supabase) {
                result.innerHTML = '❌ Supabase client not initialized'
                return
            }
            
            try {
                console.log('Testing database query...')
                const { data, error } = await supabase
                    .from('skills')
                    .select('*')
                    .limit(5)
                
                if (error) throw error
                result.innerHTML = '✅ Database query successful! Found ' + data.length + ' skills:<br><pre>' + JSON.stringify(data, null, 2) + '</pre>'
                result.style.background = '#dcfce7'
            } catch (error) {
                console.error('Database error:', error)
                result.innerHTML = '❌ Database query failed: ' + error.message + '<br><small>Make sure you have created the database tables in Supabase SQL Editor.</small>'
                result.style.background = '#fef2f2'
            }
        }
    </script>
    
    <!-- Load Supabase library at the end -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</body>
</html>
